name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      # pynput 1.8+ opens an X11 connection to validate hotkey key
      # codes on Linux.  GitHub-hosted Ubuntu runners have no DISPLAY,
      # so we install Xvfb and run pytest inside `xvfb-run -a`.  macOS
      # and Windows runners don't need this — pynput uses Cocoa /
      # Win32 hooks on those platforms.
      - name: Install Xvfb (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Headless smoke test
        run: python scripts/smoke_test.py

      # Ubuntu needs Xvfb because pynput 1.8+ opens an X11 connection
      # when parsing hotkey key codes.  macOS / Windows use native
      # Cocoa / Win32 hooks and don't need a virtual display.
      - name: Full pytest suite (Ubuntu, wrapped in Xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a python -m pytest -v --tb=short

      - name: Full pytest suite (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        run: python -m pytest -v --tb=short
